<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/images/logo_small.png' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>

  <nav class="site-nav" id="site-nav">
    <a href="{{ '/' | relative_url }}" class="nav-brand">
      <img src="{{ '/assets/images/logo_medium.png' | relative_url }}" alt="Mindstorms Engineering" class="nav-logo">
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav(this)">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/#about' | relative_url }}">About</a>
      <a href="{{ '/#services' | relative_url }}">Services</a>
      <a href="{{ '/works.html' | relative_url }}">Works</a>
      <a href="{{ '/#contact' | relative_url }}">Contact</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-col">
        <img src="{{ '/assets/images/logo_full.png' | relative_url }}" alt="Mindstorms Engineering, LLC" class="footer-logo">
      </div>
      <div class="footer-col">
        <p class="footer-label">Connect</p>
        <a href="{{ site.author.linkedin }}">LinkedIn</a>
        <a href="{{ site.author.github }}">GitHub</a>
        <a href="{{ site.author.tindie }}">Tindie</a>
        <a href="/feed.xml">RSS Feed</a>
      </div>
      <div class="footer-col">
        <p class="footer-label">Contact</p>
        <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
        <a href="tel:{{ site.author.phone | remove: '.' }}">{{ site.author.phone }}</a>
        <p class="footer-hours">{{ site.author.business_hours }}</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© {{ 'now' | date: '%Y' }} Mindstorms Engineering, LLC. All rights reserved.</span>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
